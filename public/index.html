<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tiny Next</title>
    <meta name="description" content="Tiny Next is a small Android task picker that helps users choose one manageable next task.">
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1e2a24;
        background: #f6f3ed;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 32px));
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 7vw, 4rem);
        line-height: 1;
      }

      p {
        max-width: 52ch;
        color: #4a5a51;
        font-size: 1.08rem;
        line-height: 1.65;
      }

      a {
        color: #186d52;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tiny Next</h1>
      <p>Tiny Next is a small Android task picker for choosing one manageable next task when a long list feels stuck.</p>
      <p><a href="/privacy">Read the Tiny Next privacy policy</a></p>
    </main>
  </body>
</html>
